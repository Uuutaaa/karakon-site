<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>カラコン大きさ診断</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Hiragino Sans", sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #ffd6e7, #ffeef5, #ffffff);
        }

        .card{
            width: 90%;
            max-width: 450px;

            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(15px);

            border-radius: 30px;

            padding: 35px;

            box-shadow:
            0 10px 30px rgba(255, 182, 193, 0.3);

            text-align: center;
        }

        h1{
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ff5c93;
        }

        .description{
            color: #666;
            line-height: 1.7;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .golden{
            background: #fff4f8;
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 25px;

            color: #ff5c93;
            font-weight: bold;
        }

        label{
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 15px;

            border: none;
            border-radius: 15px;

            background: #fff;

            box-shadow:
            inset 0 2px 5px rgba(0,0,0,0.05);

            font-size: 1rem;

            margin-bottom: 20px;
        }

        input:focus{
            outline: none;
            border: 2px solid #ff8fb5;
        }

        button{
            width: 100%;
            padding: 15px;

            border: none;
            border-radius: 15px;

            background: linear-gradient(135deg, #ff7aa8, #ff5c93);

            color: white;
            font-size: 1rem;
            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover{
            transform: translateY(-3px);
            box-shadow:
            0 10px 20px rgba(255, 92, 147, 0.3);
        }

        #result{
            margin-top: 25px;

            padding: 20px;

            border-radius: 20px;

            background: #fff7fa;

            color: #444;

            line-height: 1.8;

            font-size: 1.05rem;

            display: none;
        }

        .highlight{
            color: #ff5c93;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>🎀 カラコン大きさ診断 🎀</h1>

        <p class="description">
            あなたの目にぴったりな<br>
            カラコンサイズを診断するよ！
        </p>

        <div class="golden">
            白目：黒目：白目 = 0.5：1：0.5
        </div>

        <form id="size">

            <label for="width">
                目頭から目尻までの長さ(mm)
            </label>

            <input
                type="number"
                id="width"
                placeholder="例：30"
                required
            >

            <button type="submit">
                診断する ✨
            </button>

        </form>

        <div id="result"></div>

    </div>

    <script>

        document.getElementById("size").addEventListener("submit", function(event){

            event.preventDefault();

            const width =
            parseFloat(document.getElementById("width").value);

            const result =
            document.getElementById("result");

            if(isNaN(width) || width <= 0){

                result.style.display = "block";

                result.innerHTML =
                "⚠️ 正しい数値を入力してね！";

                return;
            }

            // 黄金比
            const eyeRatio = 2;

            const irisSize =
            width * (1 / eyeRatio);

            // ちょい盛り
            const recommended =
            irisSize + 2;

            result.style.display = "block";

            result.innerHTML =
            `
            👁️ 黒目の理想サイズ<br>
            <span class="highlight">
            ${irisSize.toFixed(1)} mm
            </span>

            <br><br>

            ✨ おすすめカラコンサイズ<br>

            <span class="highlight">
            ${recommended.toFixed(1)} mm
            </span>
            `;
        });

    </script>

</body>
</html>
